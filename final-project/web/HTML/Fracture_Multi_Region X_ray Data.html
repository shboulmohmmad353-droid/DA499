<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload a photo with your request</title>
    <link href="./Fracture_Multi_Region_X_ray_Data.css" rel="stylesheet">
</head>
<body>

    <div class="card">
        <h1>📤 Upload a photo with your request</h1>
        <form id="requestForm" autocomplete="off">
            
            <!-- قسم الصورة -->
            <div class="form-group">
                <label>🖼️Attached image</label>
                <div class="upload-box" id="uploadBox">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5z"/>
                    </svg>
                    <p>Drag the image here or <strong>Press to select</strong></p>
                </div>
                <input type="file" id="imageInput" accept="image/*" hidden>
                
                <div class="preview-box" id="previewBox">
                    <img id="previewImg" src="" alt="معاينة">
                    <button type="button" class="change-img-btn" id="changeBtn">🔄 تغيير الصورة</button>
                </div>
            </div>

            <!-- قسم النص -->
            <div class="form-group">
                <label for="requestText">✍️ Request text / description</label>
                <textarea id="requestText" rows="5" placeholder="Write your request, the required modification, or any comment here..."></textarea>
                <div class="char-count"><span id="charCount">0</span>500 characters</div>
            </div>

            <!---  الإرسال  -->
            <button type="submit" class="submit-btn" id="submitBtn">🚀 Submit the request</button>

            <!-- رسالة النجاح -->
            <div class="success-msg" id="successMsg">✅ Your request has been successfully received! We will review the image and text soon.</div>
        </form>
    </div>

    <script src="./Fracture_Multi_Region_X_ray_Data.js"></script>
</body>
</html>
